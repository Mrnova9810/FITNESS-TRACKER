<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login into Fitness tracker</title>
  </head>
  <body class="bg-blue-950 h-screen flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-lg p-8 w-80">
      <h1 class="text-center font-semibold mb-6 text-xl text-gray-800">
        Fitness Tracker
      </h1>
      <div class="">
        <h2 class="text-lg mb-4 text-gray-700">Login</h2>
        <form action="#" method="post">
          <div class="mb-4">
            <label class="block text-sm text-gray-600 mb-1">Username</label>
            <input
              type="text"
              name="username"
              id="username"
              placeholder="Enter username"
              class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <div class="mb-4">
            <label class="block text-sm text-gray-600 mb-1" for="password"
              >Password</label
            >
            <input
              type="password"
              name="password"
              id="password"
              placeholder="Enter your password"
              class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <div class="flex gap-3 mb-4">
            <button
              class="w-1/2 bg-gray-200 text-gray-700 py-2 rounded-md hover:bg-gray-300"
              type="reset"
            >
              Clear
            </button>
            <button
              class="w-1/2 bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700"
              type="submit"
            >
              Login
            </button>
          </div>
          <div class="flex justify-center gap-4 items-center">
            <p class="text-sm text-center text-gray-600">
              Don't have an account?
            </p>
            <a href="singUp.html" class="text-blue-600 hover:underline"
              >Sign Up</a
            >
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
