<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>SignUp</title>
  </head>
  <body class="bg-blue-950 h-screen flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-lg p-8 w-80">
      <h1 class="text-center font-semibold mb-6 text-xl text-gray-800">
        Create Account
      </h1>
      <div>
        <form action="#" method="post">
          <div class="mb-4">
            <label class="block text-sm text-gray-600 mb-1">Username :</label>
            <input
              type="text"
              name="username"
              id="username"
              placeholder="Enter username...."
              class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div>
            <label class="block text-sm text-gray-600 mb-1">Email :</label>
            <input
              type="email"
              name="email"
              id="email"
              placeholder="Enter email....."
              class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div>
            <label class="block text-sm text-gray-600 mb-1">Password : </label>
            <input
              type="password"
              name="password"
              placeholder="password..."
              class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div class="flex gap-3 mb-4 mt-4">
            <button
              class="w-1/2 bg-gray-200 text-gray-700 py-2 rounded-md hover:bg-gray-300"
              type="reset"
            >
              Clear
            </button>
            <button
              class="w-1/2 bg-blue-600 text-white py-2 rounded-md hover:bg-gray-300"
              type="submit"
            >
              Sign Up
            </button>
          </div>

          <div>
            Already have an account?
            <a class="text-blue-600 hover:underline" href="login.html">Login</a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
