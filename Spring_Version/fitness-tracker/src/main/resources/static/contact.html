<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
    <title>Contact - Fitness Tracker</title>

    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <link rel="stylesheet" href="dashboard_style.css">

    <style>
    .container { max-width: 600px; }

    .contact-box {
        opacity: 0;
        transform: translateY(50px) scale(0.95);
        animation: contactEntry 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        animation-delay: 0.2s;
    }

    @keyframes contactEntry {
        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    .card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.1);
        color: #f5f5f5;
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px) scale(1.01);
        box-shadow: 0 10px 30px rgba(255,140,66,0.2);
    }

    .form-label { color: #bbb; }

    .form-control {
        background: #2a2a2a;
        border: 1px solid rgba(255,255,255,0.1);
        color: #fff;
        border-radius: 8px;
        padding: 10px;
        transition: 0.25s;
    }

    .form-control:focus {
        border-color: #ff8c42;
        box-shadow: 0 0 0 2px rgba(255,140,66,0.2);
    }

    .btn-primary {
        background: #ff8c42;
        border: none;
    }

    .btn-primary:hover {
        background: #ffa366;
    }
    </style>
</head>

<body>

<!-- 🔥 SAME NAVBAR AS ABOUT -->

<div style="height:1px;background: linear-gradient(to right,transparent,rgba(255,140,66,0.5),transparent);"></div>

<div class="navbar">
    <div class="logo">
        <i data-lucide="activity"></i>
        Fit<span>Track</span>
    </div>

    <div class="nav-buttons">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link" style="color:#ff8c42;">Contact</a>

        <div class="dropdown d-inline-block">
            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                Features
            </a>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="calorie.html">Calorie Tracker</a></li>
                <li><a class="dropdown-item" href="weight.html">Weight Tracker</a></li>
            </ul>
        </div>

        <div class="menu-container ms-3">

            <div class="menu-icon" onclick="toggleMenu(event)">
                ☰
            </div>

            <div id="profileDropdown" style="
                display:none;
                position:absolute;
                top:55px;
                right:0;
                width:240px;
                background: rgba(30,30,30,0.6);
                backdrop-filter: blur(18px);
                border-radius:14px;
                padding:10px;
                z-index:9999;
                border:1px solid rgba(255,140,66,0.25);
                box-shadow:
                    0 10px 30px rgba(0,0,0,0.6),
                    0 0 20px rgba(255,140,66,0.15),
                    inset 0 0 10px rgba(255,140,66,0.05);
            ">

                <div style="display:flex;align-items:center;gap:10px;padding:12px;height:50px;overflow:hidden;">
                    <img id="navProfilePic" src="default.png" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">
                    <span id="navUsername">User</span>
                </div>

                <div style="height:1px;background:rgba(255,255,255,0.1);"></div>

                <a href="profile.html" style="padding:12px;color:#eee;text-decoration:none;">
                    <i class="bi bi-person" style="color:#ff8c42;"></i> View Profile
                </a>

                <a href="logout" style="padding:12px;color:#ff6b6b;text-decoration:none;">
                    <i class="bi bi-box-arrow-right" style="color:#ff8c42;"></i> Logout
                </a>

            </div>
        </div>
    </div>
</div>

<!-- CONTENT (UNCHANGED) -->
<div class="container mt-5">

    <div class="card shadow p-4 mt-4 contact-box" data-aos="fade-up" data-aos-delay="200">

        <h2 class="text-center mb-2">Contact Us</h2>

        <p class="text-center mb-4" style="color:#aaa;">
            Have questions or feedback? We'd love to hear from you.
        </p>

        <form>
            <div class="mb-3 mt-2">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" required>
            </div>

            <div class="mb-3 mt-2">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" required>
            </div>

            <div class="mb-3 mt-2">
                <label class="form-label">Message</label>
                <textarea class="form-control" rows="4" required></textarea>
            </div>

            <button class="btn btn-primary w-100">
                <i class="bi bi-send"></i> Send Message
            </button>
        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
// 🔥 EXACT SAME NAVBAR JS

function toggleMenu(event) {
    event.stopPropagation();
    const menu = document.getElementById("profileDropdown");

    if (menu.classList.contains("show")) {
        menu.classList.remove("show");
        setTimeout(() => menu.style.display = "none", 200);
    } else {
        menu.style.display = "block";
        setTimeout(() => menu.classList.add("show"), 10);
    }
}

window.onclick = function(e) {
    const menu = document.getElementById("profileDropdown");
    if (!e.target.closest(".menu-container")) {
        menu.classList.remove("show");
        setTimeout(() => menu.style.display = "none", 200);
    }
};

function loadNavbarProfile() {
    fetch("getProfile", { credentials: "include" })
    .then(res => res.json())
    .then(data => {
        document.getElementById("navUsername").innerText = data.username || "User";

        let img = document.getElementById("navProfilePic");
        if (data.profilePic && data.profilePic.trim() !== "") {
            img.src = data.profilePic;
            img.onerror = () => img.src = "default.png";
        } else {
            img.src = "default.png";
        }
    });
}

document.addEventListener("DOMContentLoaded", function () {
    loadNavbarProfile();
    lucide.createIcons();
    AOS.init({ duration: 1000, once: true });
});
</script>

</body>
</html>
