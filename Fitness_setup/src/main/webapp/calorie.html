<!DOCTYPE html>
<html>
<head>
    <title>Calorie Tracker</title>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="dashboard_style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- 🔥 NAVBAR -->
<div class="navbar">

    <div class="logo">
        <i data-lucide="activity"></i>
        Fit<span>Track</span>
    </div>

    <div class="nav-buttons">

        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link">Contact</a>

        <div class="dropdown d-inline-block ms-3">
            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown" style="color:#ff8c42;">
                Features
            </a>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item active" href="calorie.html">Calorie Tracker</a></li>
                <li><a class="dropdown-item" href="weight.html">Weight Tracker</a></li>
            </ul>
        </div>

        <div class="dropdown d-inline-block ms-3">
            <div class="profile-wrapper" data-bs-toggle="dropdown">
                <i class="bi bi-person-circle"></i>
            </div>

            <ul class="dropdown-menu dropdown-menu-end">
                <li>
                    <a class="dropdown-item text-danger" href="logout">
                        <i class="bi bi-power"></i> Logout
                    </a>
                </li>
            </ul>
        </div>

    </div>

</div>

<!-- MAIN CONTENT -->
<div class="container mt-5 mb-5">

    <div class="row g-4">

        <div class="col-md-6">
            <div class="card shadow-lg p-4 h-100">

                <h4 class="text-center mb-4">
                    <i class="bi bi-plus-circle"></i> Add Entry
                </h4>

                <form id="calorieForm">

                    <div class="mb-3">
                        <label class="form-label">Food Item</label>
                        <input type="text" name="food" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Calories</label>
                        <input type="number" name="calories" class="form-control" required>
                    </div>

                    <button class="btn btn-primary w-100 mt-2">
                        <i class="bi bi-plus-circle"></i> Add Entry
                    </button>

                </form>

                <div class="card p-3 mt-4 text-center">
                    <h6 class="text-muted">Daily Intake</h6>
                    <h2 id="totalCalories">0 / 2200 kcal</h2>
                    <p id="warningText" class="text-danger fw-bold mt-2" style="display:none;">
                        &#9888; Limit Exceeded!
                    </p>
                </div>

            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-lg p-4 h-100 text-center">

                <h4 class="mb-4">
                    <i class="bi bi-fire"></i> Calorie Distribution
                </h4>

                <div class="chart-container">
                    <canvas id="calorieChart"></canvas>
                </div>

            </div>
        </div>

    </div>

    <div class="row mt-4">
        <div class="col-12">

            <div class="card p-3 shadow">

                <h5 class="text-center mb-3">
                    <i class="bi bi-clock-history"></i> Today's Entries
                </h5>

                <table class="table">
                    <thead>
                        <tr>
                            <th>Food</th>
                            <th>Calories</th>
                            <th>Time</th>
                            <th>Delete</th>
                        </tr>
                    </thead>

                    <tbody id="calorieTable"></tbody>
                </table>

            </div>

        </div>
    </div>

</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
let chart;

function loadTotalCalories() {
    fetch("getTotalCalories")
        .then(response => response.text())
        .then(data => {
            let total = parseInt(data);

            let totalElement = document.getElementById("totalCalories");
            let warning = document.getElementById("warningText");

            totalElement.innerText = total + " / 2200 kcal";

            if (total > 2200) {
                totalElement.style.color = "red";
                warning.style.display = "block";
            } else {
                totalElement.style.color = "#ff8c42";
                warning.style.display = "none";
            }

            updateChart(total);
        });
}

function updateChart(consumed) {
    let remaining = 2200 - consumed;
    if (remaining < 0) remaining = 0;

    let ctx = document.getElementById("calorieChart").getContext("2d");

    if (chart) chart.destroy();

    let colors = consumed > 2200
        ? ["#ff0000", "#330000"]
        : ["#ff8c42", "#2a2a2a"];

    chart = new Chart(ctx, {
        type: "pie",
        data: {
            labels: ["Consumed", "Remaining"],
            datasets: [{
                data: [consumed, remaining],
                backgroundColor: colors
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });
}

function loadTable() {
    fetch("getTodayCalories")
        .then(res => res.json())
        .then(data => {
            let table = document.getElementById("calorieTable");
            table.innerHTML = "";

            data.forEach(item => {
                let row = `
                    <tr>
                        <td>${item.food}</td>
                        <td>${item.calories}</td>
                        <td>${item.time}</td>
                        <td>
                            <button onclick="deleteEntry(${item.id})" class="btn btn-sm text-danger">
                                <i class="bi bi-trash3 fs-5"></i>
                            </button>
                        </td>
                    </tr>
                `;
                table.innerHTML = row + table.innerHTML;
            });
        });
}

function deleteEntry(id) {
    fetch("deleteCalorie", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "id=" + id
    })
    .then(() => {
        loadTotalCalories();
        loadTable();
    });
}

document.addEventListener("DOMContentLoaded", function () {
    loadTotalCalories();
    loadTable();

    document.getElementById("calorieForm").addEventListener("submit", function (e) {
        e.preventDefault();

        let food = document.querySelector('input[name="food"]').value;
        let calories = document.querySelector('input[name="calories"]').value;

        fetch("addCalorie", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "food=" + encodeURIComponent(food) + "&calories=" + encodeURIComponent(calories)
        })
        .then(() => {
            document.getElementById("calorieForm").reset();
            loadTotalCalories();
            loadTable();
        });
    });
});
</script>

<script>
lucide.createIcons();
</script>

</body>
</html>
