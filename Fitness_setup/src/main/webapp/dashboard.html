<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="dashboard_style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="#">Fitness Tracker</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

        <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>

            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Features</a>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="calorie.html">Calorie Tracker</a></li>
                    <li><a class="dropdown-item" href="weight.html">Weight Tracker</a></li>
                </ul>
            </li>
        </ul>

        <ul class="navbar-nav">
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" data-bs-toggle="dropdown">
                    <div class="profile-wrapper">
                        <i class="bi bi-person-circle"></i>
                    </div>
                </a>

                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <a class="dropdown-item text-danger" href="logout">
                            <i class="bi bi-power"></i> Logout
                        </a>
                    </li>
                </ul>
            </li>
        </ul>

    </div>
</nav>

<div class="container mt-5 mb-5">

    <!-- TOP CARDS -->
    <div class="row g-4">

        <div class="col-md-3">
            <div class="card p-3 shadow text-center">
                <h6 class="text-muted">Today's Calories</h6>
                <h3 id="todayCalories">0</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow text-center">
                <h6 class="text-muted">Remaining</h6>
                <h3 id="remainingCalories">0</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow text-center">
                <h6 class="text-muted">Current Weight</h6>
                <h3 id="currentWeight">--</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow text-center">
                <h6 class="text-muted">Weekly Change</h6>
                <h3 id="weightChange">--</h3>
            </div>
        </div>

    </div>

    <!-- GRAPHS -->
    <div class="row mt-4 g-4">

        <div class="col-md-6">
            <div class="card p-4 shadow">
                <h5 class="text-center mb-3">Calorie Trend</h5>
                <div style="height: 300px;">
                    <canvas id="calorieTrendChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4 shadow">
                <h5 class="text-center mb-3">Weight Trend</h5>
                <div style="height: 300px;">
                    <canvas id="weightTrendChart"></canvas>
                </div>
            </div>
        </div>

    </div>

    <!-- INSIGHTS -->
    <div class="row mt-4">
        <div class="col-12">
            <div class="card p-4 shadow">
                <h5 class="mb-3">Insights</h5>
                <ul id="insightsList" class="list-unstyled">
                    <li>Loading insights...</li>
                </ul>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// DASHBOARD DATA
function loadDashboard() {

    fetch("getTotalCalories")
        .then(res => res.text())
        .then(data => {
            let total = parseInt(data);
            document.getElementById("todayCalories").innerText = total;
            document.getElementById("remainingCalories").innerText = 2200 - total;
        });

    fetch("getCurrentWeight")
        .then(res => res.text())
        .then(data => {
            document.getElementById("currentWeight").innerText = data;
        });

    fetch("getWeightChange")
        .then(res => res.text())
        .then(data => {
            let change = parseFloat(data);
            let el = document.getElementById("weightChange");

            if (change > 0) {
                el.innerHTML = `<i class="bi bi-arrow-up text-danger"></i> +${change} kg`;
            } else {
                el.innerHTML = `<i class="bi bi-arrow-down text-success"></i> ${change} kg`;
            }
        });
}

// GRAPHS
let calorieChart, weightChartDash;

function loadCalorieTrend() {
    fetch("getCalorieTrend")
        .then(res => res.json())
        .then(data => {

            let labels = data.map(d => d.date);
            let values = data.map(d => d.calories);

            let ctx = document.getElementById("calorieTrendChart").getContext("2d");

            if (calorieChart) calorieChart.destroy();

            calorieChart = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Calories",
                        data: values,
                        backgroundColor: "#4facfe"
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        });
}

function loadWeightTrend() {
    fetch("getWeightData")
        .then(res => res.json())
        .then(data => {

            let labels = data.map(d => d.date);
            let values = data.map(d => d.weight);

            let ctx = document.getElementById("weightTrendChart").getContext("2d");

            if (weightChartDash) weightChartDash.destroy();

            weightChartDash = new Chart(ctx, {
                type: "line",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Weight",
                        data: values,
                        borderColor: "#36a2eb",
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        });
}

// 🔥 CLEAN INSIGHTS
function loadInsights() {

    let insights = [];

    fetch("getTotalCalories")
        .then(res => res.text())
        .then(data => {

            let total = parseInt(data);

            if (total > 2200) {
                insights.push(`<i class="bi bi-exclamation-triangle text-danger"></i> Exceeded calorie limit`);
            } else if (total > 1500) {
                insights.push(`<i class="bi bi-check-circle text-success"></i> Close to goal`);
            } else {
                insights.push(`<i class="bi bi-info-circle text-primary"></i> Can consume more calories`);
            }

            updateInsights(insights);
        });

    fetch("getWeightChange")
        .then(res => res.text())
        .then(data => {

            let change = parseFloat(data);

            if (change > 0) {
                insights.push(`<i class="bi bi-arrow-up text-danger"></i> Weight increased`);
            } else if (change < 0) {
                insights.push(`<i class="bi bi-arrow-down text-success"></i> Weight decreased`);
            } else {
                insights.push(`<i class="bi bi-dash-circle text-secondary"></i> Weight stable`);
            }

            updateInsights(insights);
        });
}

function updateInsights(insights) {
    let ul = document.getElementById("insightsList");
    ul.innerHTML = "";

    insights.forEach(i => {
        ul.innerHTML += `<li class="mb-2 d-flex align-items-center gap-2">${i}</li>`;
    });
}

// LOAD
document.addEventListener("DOMContentLoaded", function () {
    loadDashboard();
    loadCalorieTrend();
    loadWeightTrend();
    loadInsights();
});
</script>

</body>
</html>
