<!DOCTYPE html>
<html>
<head>
    <title>Contact - Fitness Tracker</title>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="dashboard_style.css">
</head>

<body>

<!-- 🔥 NAVBAR -->
<div class="navbar">

    <div class="logo">
        <i data-lucide="activity"></i>
        Fit<span>Track</span>
    </div>

    <div class="nav-buttons">

        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link" style="color:#ff8c42;">Contact</a>

        <div class="dropdown d-inline-block ms-3">
            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                Features
            </a>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="calorie.html">Calorie Tracker</a></li>
                <li><a class="dropdown-item" href="weight.html">Weight Tracker</a></li>
            </ul>
        </div>

        <div class="dropdown d-inline-block ms-3">
            <div class="profile-wrapper" data-bs-toggle="dropdown">
                <i class="bi bi-person-circle"></i>
            </div>

            <ul class="dropdown-menu dropdown-menu-end">
                <li>
                    <a class="dropdown-item text-danger" href="logout">
                        <i class="bi bi-power"></i> Logout
                    </a>
                </li>
            </ul>
        </div>

    </div>

</div>

<!-- CONTENT -->
<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Contact Us</h2>

        <form>
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea class="form-control" rows="4" placeholder="Write your message..." required></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Send Message
            </button>
        </form>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
lucide.createIcons();
</script>

</body>
</html>
