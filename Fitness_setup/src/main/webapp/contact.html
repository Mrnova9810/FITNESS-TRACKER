<!DOCTYPE html>
<html>
<head>
    <title>Contact - Fitness Tracker</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="dashboard_style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    
    <a class="navbar-brand" href="dashboard.html">Fitness Tracker</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

        <!-- Left -->
        <ul class="navbar-nav me-auto">

            <li class="nav-item">
                <a class="nav-link" href="dashboard.html">Dashboard</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="about.html">About</a>
            </li>

            <li class="nav-item">
                <a class="nav-link active" href="contact.html">Contact Us</a>
            </li>

            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                    Features
                </a>

                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="calorie.html">Calorie Tracker</a></li>
                    <li><a class="dropdown-item" href="weight.html">Weight Tracker</a></li>
                </ul>
            </li>

        </ul>

        <!-- Right -->
        <ul class="navbar-nav">
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle d-flex align-items-center"
                   href="#" role="button" data-bs-toggle="dropdown">

                    <div class="profile-wrapper">
                        <i class="bi bi-person-circle"></i>
                    </div>

                </a>

                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <a class="dropdown-item text-danger" href="logout">
                            <i class="bi bi-power"></i> Logout
                        </a>
                    </li>
                </ul>
            </li>
        </ul>

    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Contact Us</h2>

        <form>
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea class="form-control" rows="4" placeholder="Write your message..." required></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Send Message
            </button>
        </form>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
