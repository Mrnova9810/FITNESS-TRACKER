<!DOCTYPE html>
<html>
<head>
    <title>Contact - Fitness Tracker</title>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="dashboard_style.css">

    <style>
    /* PAGE */
    .container {
        max-width: 600px;
    }

    /* 🔥 CONTACT ENTRY (LIKE ABOUT PAGE) */
    .contact-box {
        opacity: 0;
        transform: translateY(50px) scale(0.95);
        animation: contactEntry 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        animation-delay: 0.2s;
    }

    @keyframes contactEntry {
        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    /* CARD */
    .card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.1);
        color: #f5f5f5;
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px) scale(1.01);
        box-shadow: 0 10px 30px rgba(255,140,66,0.2);
    }

    /* TITLE */
    .card h2 {
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    /* LABELS */
    .form-label {
        color: #bbb;
        font-size: 14px;
    }

    /* INPUTS */
    .form-control {
        background: #2a2a2a;
        border: 1px solid rgba(255,255,255,0.1);
        color: #fff;
        border-radius: 8px;
        padding: 10px;
        transition: all 0.25s ease;
    }

    .form-control:focus {
        background: #2a2a2a;
        color: #fff;
        border-color: #ff8c42;
        box-shadow: 0 0 0 2px rgba(255,140,66,0.2);
        transform: scale(1.02);
    }

    textarea.form-control {
        resize: none;
    }

    /* BUTTON */
    .btn-primary {
        background: #ff8c42;
        border: none;
        border-radius: 8px;
        font-weight: 500;
        padding: 10px;
        transition: 0.3s;
    }

    .btn-primary:hover {
        background: #ffa366;
        box-shadow: 0 5px 15px rgba(255,140,66,0.3);
    }

    .btn-primary:active {
        transform: scale(0.96);
    }

    /* LOGO */
    .logo i {
        color: #ff8c42;
    }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">
        <i data-lucide="activity"></i>
        Fit<span>Track</span>
    </div>

    <div class="nav-buttons">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link" style="color:#ff8c42;">Contact</a>

        <div class="dropdown d-inline-block ms-3">
            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                Features
            </a>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="calorie.html">Calorie Tracker</a></li>
                <li><a class="dropdown-item" href="weight.html">Weight Tracker</a></li>
            </ul>
        </div>

        <div class="dropdown d-inline-block ms-3">
            <div class="profile-wrapper" data-bs-toggle="dropdown">
                <i class="bi bi-person-circle"></i>
            </div>

            <ul class="dropdown-menu dropdown-menu-end">
                <li>
                    <a class="dropdown-item text-danger" href="logout">
                        <i class="bi bi-power"></i> Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</div>

<!-- CONTENT -->
<div class="container mt-5">

    <div class="card shadow p-4 mt-4 contact-box" data-aos="fade-up" data-aos-delay="200">

        <h2 class="text-center mb-2">Contact Us</h2>

        <p class="text-center mb-4" style="color:#aaa;">
            Have questions or feedback? We'd love to hear from you.
        </p>

        <form>
            <div class="mb-3 mt-2" data-aos="fade-up" data-aos-delay="300">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="mb-3 mt-2" data-aos="fade-up" data-aos-delay="400">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="mb-3 mt-2" data-aos="fade-up" data-aos-delay="500">
                <label class="form-label">Message</label>
                <textarea class="form-control" rows="4" placeholder="Write your message..." required></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100" data-aos="fade-up" data-aos-delay="600">
                <i class="bi bi-send"></i> Send Message
            </button>
        </form>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
lucide.createIcons();

AOS.init({
    duration: 1000,
    once: true
});
</script>

</body>
</html>
